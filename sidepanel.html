<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Bar</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div id="sidebar">
    <div id="pinned-tabs"></div>

    <div id="toolbar">
      <button id="tidy-tab-bar" class="toolbar-btn" title="Collapse all groups and move ungrouped tabs to the end">&#10024; Tidy the Tabs</button>
      <button id="merge-duplicates" class="toolbar-btn" title="Merge duplicate tab groups">&#128279; Merge Dupes</button>
      <button id="add-category" class="toolbar-btn" title="Add a category">+ Category</button>
      <div class="toolbar-spacer"></div>
      <button id="toolbar-clear-data" class="toolbar-btn clear-site-data-btn" title="Clear site data & reload">
        <span class="clear-icon-cookie">&#127850;</span><span class="clear-icon-trash">&#9940;</span>
      </button>
    </div>

    <nav id="view-nav">
      <button class="view-tab active" data-view="tabs">Tabs</button>
      <button class="view-tab" data-view="bookmarks">Bookmarks</button>
      <button class="view-tab" data-view="history">History</button>
    </nav>

    <div id="view-tabs" class="view active">
      <div id="tab-groups"></div>

      <div id="ungrouped-tabs" class="section">
        <div class="section-header" data-section="ungrouped">
          <span class="section-collapse">&#9660;</span>
          <span class="section-title">Ungrouped Tabs</span>
          <span class="section-count"></span>
          <button id="close-ungrouped" class="section-action-btn" title="Close all ungrouped tabs">&#128465;</button>
        </div>
        <div class="section-body-wrap">
          <div class="section-body tab-list"></div>
        </div>
      </div>

      <div id="saved-groups" class="section">
        <div class="section-header" data-section="saved-groups">
          <span class="section-collapse">&#9660;</span>
          <span class="section-title">Saved Groups</span>
          <span class="section-count"></span>
        </div>
        <div class="section-body-wrap">
          <div class="section-body"></div>
        </div>
      </div>

    </div>

    <div id="view-bookmarks" class="view">
      <div id="bookmarks-toolbar">
        <button id="bookmarks-collapse-all" title="Collapse all folders">Collapse All</button>
      </div>
      <div id="bookmarks-content"></div>
    </div>

    <div id="view-history" class="view">
      <div id="history-content"></div>
    </div>
  </div>

  <div id="rename-input-container" class="hidden">
    <input id="rename-input" type="text" />
  </div>

  <div id="context-menu" class="hidden">
    <div class="ctx-item" data-action="new-tab-below">New Tab Below</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item ctx-expand-trigger" id="ctx-add-to-group">
      Add to Group
      <span class="ctx-arrow" id="ctx-group-arrow">&#9656;</span>
    </div>
    <div class="ctx-expand-body hidden" id="ctx-group-list"></div>
    <div class="ctx-item" data-action="move-to-window">Move to New Window</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-action="reload">Reload</div>
    <div class="ctx-item" data-action="duplicate">Duplicate</div>
    <div class="ctx-item" data-action="pin">Pin</div>
    <div class="ctx-item" data-action="pin-in-group">Pin in Group</div>
    <div class="ctx-item" data-action="mute">Mute Site</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-action="close">Close</div>
    <div class="ctx-item" data-action="close-others">Close Other Tabs</div>
  </div>

  <div id="group-context-menu" class="hidden">
    <div class="ctx-group-name-row">
      <input type="text" id="ctx-group-name-input" class="ctx-group-name-input" placeholder="Name This Group" />
    </div>
    <div class="ctx-color-row" id="ctx-color-row"></div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-group-action="new-tab-in-group">New Tab in Group</div>
    <div class="ctx-item" data-group-action="move-group-to-window">Move Group to New Window</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-group-action="save-group">Save Group</div>
    <div class="ctx-item" data-group-action="close-group">Close &amp; Save Group</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item ctx-expand-trigger" data-group-action="move-to-category">Move to Category <span class="ctx-arrow">&#9656;</span></div>
    <div class="ctx-expand-body hidden" id="ctx-category-list"></div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-group-action="ungroup">Ungroup</div>
    <div class="ctx-item ctx-danger" data-group-action="delete-group">Delete Group</div>
  </div>

  <div id="clear-data-menu" class="hidden">
    <div class="ctx-clear-header-row">
      <div class="ctx-clear-header"></div>
      <button id="clear-data-close" class="ctx-clear-close" title="Close">&times;</button>
    </div>
    <div id="clear-data-list"></div>
    <div class="ctx-separator"></div>
    <div class="ctx-item ctx-clear-btn" id="ctx-clear-selected">Clear Selected &amp; Reload</div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
